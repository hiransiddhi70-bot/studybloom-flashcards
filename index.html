<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBloom AI 🌸 Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-pink-100 via-purple-100 to-sky-100 min-h-screen flex items-center justify-center">
  <div id="bubbles" class="fixed inset-0 overflow-hidden pointer-events-none"></div>

  <div class="relative z-10 bg-white/80 backdrop-blur rounded-3xl p-8 shadow-2xl w-11/12 max-w-md">
    <h1 class="title-font text-4xl font-bold text-center text-purple-600 mb-2">StudyBloom AI 🧸</h1>
    <p class="text-center text-gray-600 mb-6">Your cute study buddy 🌸</p>

    <div id="loginForm">
      <input id="username" placeholder="Username" class="w-full mb-3 px-4 py-3 rounded-2xl bg-pink-50 outline-none">
      <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-4 py-3 rounded-2xl bg-pink-50 outline-none">
      <button id="loginBtn" class="w-full py-3 bg-pink-400 hover:bg-pink-500 text-white rounded-2xl font-semibold">Login 💖</button>
      <p class="text-center mt-4 text-sm">New here? <span id="signupToggle" class="text-purple-600 cursor-pointer font-bold">Sign up</span></p>
    </div>

    <div id="signupForm" class="hidden">
      <input id="newUsername" placeholder="Choose username" class="w-full mb-3 px-4 py-3 rounded-2xl bg-pink-50 outline-none">
      <input id="newPassword" type="password" placeholder="Choose password" class="w-full mb-4 px-4 py-3 rounded-2xl bg-pink-50 outline-none">
      <button id="signupBtn" class="w-full py-3 bg-purple-400 hover:bg-purple-500 text-white rounded-2xl font-semibold">Sign Up 🎀</button>
      <p class="text-center mt-4 text-sm">Have account? <span id="loginToggle" class="text-pink-600 cursor-pointer font-bold">Login</span></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
