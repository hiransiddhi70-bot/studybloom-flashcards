<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - StudyBloom AI 🌸</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-pink-100 via-purple-100 to-sky-100 dark:from-gray-900 dark:via-purple-900 dark:to-slate-900 min-h-screen transition-all duration-500">

  <!-- Floating Bubbles Background 🎀 -->
  <div id="bubbles" class="fixed inset-0 overflow-hidden pointer-events-none"></div>

  <div class="relative z-10 max-w-4xl mx-auto p-4">

    <!-- Header + Navbar 🌸 -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="title-font text-4xl font-bold text-purple-600 dark:text-pink-300">
        StudyBloom AI 🧸
      </h1>
      <button id="themeToggle" class="text-2xl bg-white/50 dark:bg-black/30 p-2 rounded-full backdrop-blur">
        🌙
      </button>
    </div>

    <nav class="flex gap-4 mb-6 text-sm font-semibold">
      <a href="dashboard.html" class="text-purple-600 border-b-2 border-purple-600">Dashboard 📚</a>
      <a href="profile.html" class="text-gray-600 hover:text-purple-600 dark:text-gray-300">Profile 👤</a>
      <a href="about.html" class="text-gray-600 hover:text-purple-600 dark:text-gray-300">About 🌸</a>
      <button id="logoutBtn" class="ml-auto text-red-500">Logout</button>
    </nav>

    <!-- Controls 📌 -->
    <div class="bg-white/60 dark:bg-black/40 backdrop-blur rounded-3xl p-4 mb-6 shadow-lg">
      <div class="flex flex-wrap gap-3 mb-3">
        <input id="search" placeholder="🔍 Search flashcards..."
               class="flex-1 px-4 py-2 rounded-2xl bg-pink-50 dark:bg-gray-800 outline-none">
        <button id="addBtn" class="px-4 py-2 bg-pink-400 hover:bg-pink-500 text-white rounded-2xl font-semibold">
          ➕ Add Card
        </button>
        <button id="importBtn" class="px-4 py-2 bg-sky-400 hover:bg-sky-500 text-white rounded-2xl font-semibold">
          📥 Import
        </button>
        <button id="exportBtn" class="px-4 py-2 bg-purple-400 hover:bg-purple-500 text-white rounded-2xl font-semibold">
          📤 Export
        </button>
      </div>

      <!-- New Features Row 🎯 -->
      <div class="flex flex-wrap gap-3 mt-4">
        <button id="quizBtn" class="px-4 py-2 bg-yellow-400 hover:bg-yellow-500 text-white rounded-2xl font-semibold">
          🤖 AI Quiz
        </button>
        <button id="pomodoroBtn" class="px-4 py-2 bg-red-400 hover:bg-red-500 text-white rounded-2xl font-semibold">
          🍅 Pomodoro
        </button>
        <button id="categoryBtn" class="px-4 py-2 bg-green-400 hover:bg-green-500 text-white rounded-2xl font-semibold">
          📁 Category
        </button>
        <button id="leaderboardBtn" class="px-4 py-2 bg-indigo-400 hover:bg-indigo-500 text-white rounded-2xl font-semibold">
          🏆 Leaderboard
        </button>
      </div>

      <!-- Category Filter 📁 -->
      <select id="categoryFilter" class="mt-3 w-full px-4 py-2 rounded-2xl bg-pink-50 dark:bg-gray-800 outline-none">
        <option value="">All Categories 🌸</option>
      </select>

      <!-- Progress Bar 📊 -->
      <div class="w-full bg-pink-100 dark:bg-gray-700 rounded-full h-4 mt-4">
        <div id="progress" class="bg-gradient-to-r from-pink-400 to-purple-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>
      <p class="text-sm text-center mt-1 text-gray-600 dark:text-gray-300">
        <span id="reviewed">0</span> / <span id="total">0</span> cards reviewed
      </p>
    </div>

    <!-- Flashcards Grid 📚 -->
    <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Empty State 🧸 -->
    <div id="empty" class="text-center py-20 text-gray-500 dark:text-gray-400">
      <div class="text-6xl mb-4">📚</div>
      <p class="text-xl">No flashcards yet! Add one to start blooming 🌸</p>
    </div>

  </div>

  <!-- Add Card Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-11/12 max-w-md">
      <h2 class="title-font text-2xl mb-4 text-purple-600 dark:text-pink-300">Add New Card 🎀</h2>
      <input id="frontInput" placeholder="Front: Question/Term" class="w-full mb-3 px-4 py-2 rounded-2xl bg-pink-50 dark:bg-gray-700 outline-none">
      <textarea id="backInput" placeholder="Back: Answer/Definition" class="w-full mb-3 px-4 py-2 rounded-2xl bg-pink-50 dark:bg-gray-700 outline-none h-24"></textarea>
      <select id="categoryInput" class="w-full mb-4 px-4 py-2 rounded-2xl bg-pink-50 dark:bg-gray-700 outline-none">
        <option value="General">General 📚</option>
        <option value="Physics">Physics ⚡</option>
        <option value="Math">Math 🧮</option>
        <option value="Biology">Biology 🧬</option>
        <option value="Chemistry">Chemistry 🧪</option>
      </select>
      <div class="flex gap-3">
        <button id="saveCard" class="flex-1 py-2 bg-pink-400 hover:bg-pink-500 text-white rounded-2xl font-semibold">Save 💾</button>
        <button id="closeModal" class="px-6 py-2 bg-gray-300 dark:bg-gray-600 rounded-2xl">Cancel</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" class="hidden" accept=".txt">
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
